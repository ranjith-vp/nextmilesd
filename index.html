  :root {

    --text-muted: #666;
  }

    color: var(--black);

    line-height: 1.6;

    height: 64px;
    z-index: 100;

    font-family: 'Barlow Condensed', sans-serif;

    color: #ccc;
    text-decoration: none;
    font-size: .9rem;

    overflow: hidden;
